name: Task3 Dev Deploy

on:
  workflow_dispatch:

jobs:
  deploy-dev:
    runs-on: ubuntu-latest

    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    steps:
      - name: Checkout student repo
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          echo "Host *" > ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config
          echo "  UserKnownHostsFile /dev/null" >> ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Deploy develop branch on VM
        run: |
          ssh root@134.209.238.58 "
            set -e

            export DOCKER_USERNAME='${DOCKER_USERNAME}'
            export DOCKER_PASSWORD='${DOCKER_PASSWORD}'

            echo '=== Preparing student repo on VM ==='
            rm -rf /root/devops-exam || true
            git clone https://github.com/VovaKondrasiuk/devops-exam.git /root/devops-exam

            echo '=== Preparing application repo (develop) ==='
            rm -rf /root/devops-exam-app || true
            git clone -b develop https://github.com/YulianSalo/devops-exam-pt2.git /root/devops-exam-app

            echo '=== Running task3 deploy ==='
            cd /root/devops-exam
            chmod +x task3/deploy.sh
            chmod +x task3/verify.sh

            ./task3/deploy.sh hello-world dev develop 8002 /root/devops-exam-app
            ./task3/verify.sh dev 8002
          "
